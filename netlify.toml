[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Content-Security-Policy = "frame-ancestors 'self'"

[[redirects]]
  from = "https://sportelloscuola2-0.it/*"
  to = "https://www.sportelloscuola2-0.it/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.sportelloscuola2-0.it/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  base = "project"
  command = "npm run build"
  publish = "dist"
